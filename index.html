<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salon Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    :root {
      --gold: #B9975B;
      --gold-dim: #A3834C;
      --green: #528B6A;
      --red: #D65C5C;
      --text-dark: #2A2825;
      --text-light: #F4F2EC;
      
      --staff-bg: #0F0F0F;
      --staff-surface: #181818;
      --staff-border: #2A2A2A;
      
      --tv-bg: #FBFaf7;
      --tv-surface: #FFFFFF;
      --tv-border: #EBE6DD;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

    body {
      height: 100vh; width: 100vw; overflow: hidden;
      display: flex;
      background: var(--staff-bg);
      color: var(--text-light);
    }

    /* ── COMPLETELY HIDDEN SIDEBAR ── */
    #sidebar {
      width: 280px;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(10px);
      border-right: 1px solid var(--staff-border);
      display: flex; flex-direction: column;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
      z-index: 900;
      white-space: nowrap;
      overflow: hidden;
      opacity: 1;
    }
    #sidebar.hidden {
      width: 0px;
      opacity: 0;
      border-right: none;
    }
    
    .brand {
      padding: 32px 24px;
      border-bottom: 1px solid var(--staff-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    
    .nav-links { display: flex; flex-direction: column; padding: 24px 16px; gap: 12px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 16px;
      padding: 16px; border-radius: 12px;
      color: #999; text-decoration: none; cursor: pointer;
      transition: all 0.3s ease;
      font-size: 15px; letter-spacing: 0.03em;
    }
    .nav-item:hover { background: rgba(255,255,255,0.03); color: #FFF; transform: translateX(4px); }
    .nav-item.active { background: var(--gold); color: #111; font-weight: 500; box-shadow: 0 4px 15px rgba(185, 151, 91, 0.2); transform: none; }
    .nav-item i { font-size: 22px; flex-shrink: 0; }

    @media (max-width: 768px) {
      body { flex-direction: column-reverse; }
      #sidebar { width: 100% !important; height: 80px; flex-direction: row; border-right: none; border-top: 1px solid var(--staff-border); opacity: 1; }
      #sidebar.hidden { height: 0px; opacity: 0; border-top: none; }
      .brand { display: none; }
      .nav-links { flex-direction: row; padding: 8px; justify-content: space-around; width: 100%; }
      .nav-item { flex-direction: column; gap: 6px; padding: 12px; font-size: 12px; justify-content: center; width: 100%; }
      .nav-item i { font-size: 24px; }
    }

    /* ── MAIN CONTENT AREA ── */
    #main-content { flex: 1; position: relative; overflow: hidden; }
    .view-container { position: absolute; inset: 0; display: none; overflow-y: auto; }
    .view-container.active { display: block; }

    /* ── VIEW 1: STAFF OPERATIONS ── */
    #view-staff { padding: 40px; }
    .staff-header { 
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; 
      background: var(--staff-surface); padding: 16px 24px; border-radius: 16px; border: 1px solid var(--staff-border);
    }
    
    .header-left { display: flex; align-items: center; gap: 20px; }
    .menu-btn {
      background: transparent; border: none; color: #FFF; cursor: pointer;
      font-size: 28px; display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, transform 0.2s;
    }
    .menu-btn:hover { color: var(--gold); transform: scale(1.05); }
    
    .staff-title { font-size: 26px; font-weight: 600; color: #FFF; letter-spacing: 0.02em; }
    
    .header-actions { display: flex; align-items: center; gap: 16px; }
    
    .master-assign-group {
      display: flex; align-items: center; gap: 12px;
      background: #111; padding: 6px 6px 6px 16px; border-radius: 12px;
      border: 1px solid #333;
    }
    .master-assign-group span { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; }
    .elegant-dropdown {
      padding: 10px 16px; border-radius: 8px; border: 1px solid var(--staff-border);
      background: #1A1A1A; color: #FFF; font-family: 'Outfit', sans-serif; font-size: 15px;
      cursor: pointer; outline: none; min-width: 140px; transition: border-color 0.3s;
    }
    .elegant-dropdown:focus { border-color: var(--gold); }
    
    .btn-refresh {
      background: #1A1A1A; border: 1px solid var(--staff-border); color: #FFF;
      padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 15px;
      display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .btn-refresh:hover { background: #222; border-color: #444; }
    
    .staff-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 32px; }
    .staff-col {
      background: transparent; display: flex; flex-direction: column;
      max-height: calc(100vh - 160px);
    }
    .staff-col-head { 
      padding: 0 0 16px 0; font-weight: 500; display: flex; justify-content: space-between; 
      font-size: 18px; color: #CCC; letter-spacing: 0.04em; border-bottom: 1px solid var(--staff-border); margin-bottom: 16px;
    }
    .staff-col-body { overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding-right: 8px; }
    .staff-col-body::-webkit-scrollbar { width: 6px; }
    .staff-col-body::-webkit-scrollbar-track { background: transparent; }
    .staff-col-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .staff-card { 
      background: var(--staff-surface); border: 1px solid var(--staff-border); 
      border-radius: 16px; padding: 24px; transition: transform 0.2s, box-shadow 0.2s;
    }
    .staff-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); border-color: #333; }
    .sc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .sc-name { font-size: 22px; font-weight: 500; color: #FFF; }
    .sc-service { font-size: 15px; color: #999; margin-bottom: 20px; }
    .sc-actions { display: flex; gap: 12px; }
    
    .btn-assign {
      padding: 12px 24px; border-radius: 10px; border: none; background: var(--gold);
      color: #111; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s;
      flex: 1; text-align: center; box-shadow: 0 4px 12px rgba(185, 151, 91, 0.15);
    }
    .btn-assign:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-cancel {
      padding: 12px 20px; border-radius: 10px; border: 1px solid var(--staff-border); background: transparent;
      color: #888; font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel:hover { background: rgba(214, 92, 92, 0.1); color: var(--red); border-color: rgba(214, 92, 92, 0.3); }
    .btn-green { 
      background: rgba(82, 139, 106, 0.1); color: var(--green); border: 1px solid rgba(82, 139, 106, 0.3);
      padding: 14px; border-radius: 10px; flex: 1; cursor: pointer; font-weight: 500; font-size: 15px; transition: all 0.2s;
    }
    .btn-green:hover { background: var(--green); color: #FFF; }

    /* ── VIEW 2: HIGH-DENSITY TV DISPLAY ── */
    #view-tv { background: var(--tv-bg); color: var(--text-dark); padding: 32px; }
    .tv-shell { display: grid; grid-template-rows: auto 1fr; gap: 24px; height: 100%; max-width: 1800px; margin: 0 auto; }
    .tv-header { 
      display: flex; align-items: center; justify-content: space-between; 
      background: var(--tv-surface); border: 1px solid var(--tv-border); border-radius: 20px; 
      padding: 20px 32px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); 
    }
    .tv-brand { 
      font-family: 'Cormorant Garamond', serif; font-size: 36px; color: var(--gold); font-weight: 600; 
      cursor: pointer; user-select: none; transition: opacity 0.2s;
    }
    .tv-brand:hover { opacity: 0.8; }
    .tv-brand span { color: var(--text-dark); font-weight: 400; }
    .tv-time { font-family: 'DM Mono', monospace; font-size: 26px; text-align: right; font-weight: 300; }
    .tv-date { font-size: 13px; color: var(--gold-dim); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; margin-top: 2px;}
    
    .tv-body { display: grid; grid-template-columns: 1.3fr 1fr; gap: 24px; min-height: 0; }
    
    .tv-panel { 
      background: var(--tv-surface); border: 1px solid var(--tv-border); border-radius: 20px; 
      box-shadow: 0 8px 30px rgba(0,0,0,0.03); display: flex; flex-direction: column; overflow: hidden; 
    }
    .tv-panel-head { 
      padding: 20px 32px; border-bottom: 1px solid var(--tv-border); background: #FAFAFA; 
      font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: #111;
    }
    .tv-panel-body { padding: 20px 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    
    /* Active Card (Fits 5 comfortably) */
    .tv-active-card { 
      display: flex; align-items: center; gap: 20px; padding: 16px 24px; border: 1px solid var(--tv-border); 
      border-radius: 16px; background: #FFF; transition: border-color 0.3s;
    }
    .tv-chair { 
      width: 56px; height: 56px; border-radius: 50%; background: rgba(185,151,91,0.05); 
      border: 1px solid rgba(185,151,91,0.3); display: flex; flex-direction: column; 
      align-items: center; justify-content: center; color: var(--gold-dim); flex-shrink: 0;
    }
    .tv-chair span { font-size: 9px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; margin-bottom: -2px;}
    .tv-chair strong { font-family: 'Cormorant Garamond', serif; font-size: 26px; line-height: 1; }
    .tv-ac-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: #111;}
    
    /* Queue Card (Fits 10 comfortably) */
    .tv-queue-card { 
      display: flex; align-items: center; gap: 16px; padding: 12px 16px; 
      border: 1px solid #F4F2EC; border-radius: 12px; background: #FFF;
    }
    .tv-q-num { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--gold-dim); width: 24px; font-weight: 500; text-align: center;}
    .tv-q-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; flex: 1; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
    .tv-q-time { font-family: 'DM Mono', monospace; color: var(--muted); font-size: 15px;}

    /* ── SETUP OVERLAY ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    .modal { background: var(--staff-surface); border: 1px solid var(--staff-border); border-radius: 24px; padding: 40px; width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .modal h3 { font-size: 28px; margin-bottom: 32px; color: #FFF; font-family: 'Cormorant Garamond', serif; font-weight: 600;}
    .setup-input { width: 100%; padding: 16px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #333; background: #111; color: #FFF; font-family: 'DM Mono', monospace; font-size: 15px; outline: none; transition: border-color 0.3s;}
    .setup-input:focus { border-color: var(--gold); }
  </style>
</head>
<body>

  <div class="modal-overlay" id="setup-modal">
    <div class="modal">
      <h3>System Setup</h3>
      <input id="cfg-url" class="setup-input" type="text" placeholder="Supabase URL">
      <input id="cfg-key" class="setup-input" type="password" placeholder="Anon Key">
      <button class="btn-assign" style="width:100%; padding:16px; font-size:16px;" onclick="initApp()">Connect Database</button>
    </div>
  </div>

  <nav id="sidebar" class="hidden">
    <div class="brand">
      <div class="brand-text">Salon OS</div>
    </div>
    <div class="nav-links">
      <a class="nav-item active" onclick="switchView('staff', this)">
        <i class="ph ph-users-three"></i> <span>Staff Operations</span>
      </a>
      <a class="nav-item" onclick="switchView('tv', this)">
        <i class="ph ph-monitor-play"></i> <span>Waiting Area TV</span>
      </a>
    </div>
  </nav>

  <main id="main-content">
    
    <div id="view-staff" class="view-container active">
      <div class="staff-header">
        
        <div class="header-left">
          <button class="menu-btn" onclick="toggleSidebar()"><i class="ph ph-list"></i></button>
          <div class="staff-title">Today's Bookings</div>
        </div>

        <div class="header-actions">
          <div class="master-assign-group">
            <span>Assign to</span>
            <select id="master-chair-select" class="elegant-dropdown">
              <option value="" disabled selected>Select Chair...</option>
            </select>
          </div>
          <button class="btn-refresh" onclick="fetchData()"><i class="ph ph-arrows-clockwise"></i> Sync</button>
        </div>

      </div>
      
      <div class="staff-grid">
        <div class="staff-col">
          <div class="staff-col-head"><span>In Queue</span> <span id="staff-q-count" style="color:var(--gold); font-family:'DM Mono';">0</span></div>
          <div class="staff-col-body" id="staff-queued-list"></div>
        </div>
        
        <div class="staff-col">
          <div class="staff-col-head"><span>Active in Chair</span> <span id="staff-a-count" style="color:var(--green); font-family:'DM Mono';">0</span></div>
          <div class="staff-col-body" id="staff-active-list"></div>
        </div>
      </div>
    </div>

    <div id="view-tv" class="view-container">
      <div class="tv-shell">
        <div class="tv-header">
          <div class="tv-brand" onclick="toggleSidebar()">Elegant <span>Studio</span></div>
          <div>
            <div class="tv-time" id="clock">00:00 AM</div>
            <div class="tv-date" id="date-str">JAN 1, 2026</div>
          </div>
        </div>
        <div class="tv-body">
          <div class="tv-panel">
            <div class="tv-panel-head">Currently Serving</div>
            <div class="tv-panel-body" id="tv-active-list"></div>
          </div>
          <div class="tv-panel">
            <div class="tv-panel-head">Up Next</div>
            <div class="tv-panel-body" id="tv-queue-list"></div>
          </div>
        </div>
      </div>
    </div>

  </main>

<script>
let supabaseClient = null;
let activeBookings = [];
let totalChairs = 3; 

// --- UI TOGGLES ---
function toggleSidebar() { 
  document.getElementById('sidebar').classList.toggle('hidden'); 
}

function switchView(viewId, el) {
  document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`view-${viewId}`).classList.add('active');
  el.classList.add('active');
  
  // Auto-hide sidebar after selection
  if(window.innerWidth <= 768 || viewId === 'tv') {
      document.getElementById('sidebar').classList.add('hidden');
  }
}

// --- CLOCK ---
setInterval(() => {
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('date-str').textContent = d.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'short' });
}, 1000);

// --- INIT & FETCH ---
async function initApp() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  if(!url || !key) return alert("Required fields missing");

  supabaseClient = supabase.createClient(url, key);
  document.getElementById('setup-modal').style.display = 'none';
  
  await fetchSettings();
  await fetchData();
  
  supabaseClient.channel('custom-all-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, () => fetchData())
    .subscribe();
}

async function fetchSettings() {
  try {
    const { data, error } = await supabaseClient
      .from('admin_salon_settings')
      .select('concurrent_chairs')
      .limit(1)
      .single();
      
    if (data && data.concurrent_chairs) {
      totalChairs = data.concurrent_chairs;
    }
  } catch (err) { console.warn("Fetch settings error", err); }
}

async function fetchData() {
  const today = new Date().toISOString().split('T')[0];
  
  const { data, error } = await supabaseClient
    .from('view_dashboard')
    .select('*')
    .eq('booking_date', today)
    .in('status', ['pending', 'queued', 'confirmed', 'active'])
    .order('start_time', { ascending: true });

  if (error) { console.error(error); return; }
  activeBookings = data || [];
  renderAll();
}

// --- RENDERING ---
function renderAll() {
  const queued = activeBookings.filter(b => ['pending', 'queued', 'confirmed'].includes(b.status));
  const active = activeBookings.filter(b => b.status === 'active');
  const occupiedChairs = active.map(b => b.chair_number);

  document.getElementById('staff-q-count').textContent = queued.length;
  document.getElementById('staff-a-count').textContent = active.length;

  // Update Master Dropdown
  let masterOptions = '<option value="" disabled selected>Select Open Chair...</option>';
  let hasAvailable = false;
  for(let i = 1; i <= totalChairs; i++) {
    if(!occupiedChairs.includes(i)) {
      masterOptions += `<option value="${i}">Chair ${i}</option>`;
      hasAvailable = true;
    }
  }
  if (!hasAvailable) {
    masterOptions = '<option value="" disabled selected>All Chairs Full</option>';
  }
  document.getElementById('master-chair-select').innerHTML = masterOptions;

  // --- STAFF QUEUE RENDER ---
  document.getElementById('staff-queued-list').innerHTML = queued.map(b => `
    <div class="staff-card">
      <div class="sc-top">
        <div class="sc-name">${b.customer_name}</div>
        <div style="font-family:'DM Mono'; color:#666; font-size:14px;">${new Date(b.start_time).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div class="sc-service">${b.package_name || 'Custom Service'} • ${Math.round(b.total_duration_minutes || 0)}m</div>
      
      <div class="sc-actions">
        <button class="btn-cancel" onclick="updateStatus(${b.booking_id}, 'cancelled')">Cancel</button>
        <button class="btn-assign" onclick="assignFromMaster(${b.booking_id})">Start Service</button>
      </div>
    </div>`).join('') || '<div style="color:#555; font-style:italic; padding:20px 0;">Queue is currently empty.</div>';

  // --- STAFF ACTIVE RENDER ---
  document.getElementById('staff-active-list').innerHTML = active.map(b => `
    <div class="staff-card" style="border-left: 4px solid var(--green);">
      <div class="sc-top">
        <div class="sc-name">${b.customer_name}</div>
        <div style="font-family:'DM Mono'; font-size:18px; color:var(--green); font-weight:500;">Chair ${b.chair_number}</div>
      </div>
      <div class="sc-service">${b.package_name || 'Custom Service'}</div>
      <div class="sc-actions" style="margin-top:24px;">
        <button class="btn-green" onclick="updateStatus(${b.booking_id}, 'completed')"><i class="ph ph-check-circle" style="vertical-align:middle; margin-right:6px; font-size:20px;"></i> Mark as Completed</button>
      </div>
    </div>`).join('') || '<div style="color:#555; font-style:italic; padding:20px 0;">No active services.</div>';

  // --- HIGH DENSITY TV RENDER ---
  document.getElementById('tv-active-list').innerHTML = active.map(b => `
    <div class="tv-active-card">
      <div class="tv-chair"><span>Chair</span><strong>${b.chair_number}</strong></div>
      <div>
        <div class="tv-ac-name">${b.customer_name}</div>
        <div style="color:var(--muted); font-size: 16px; margin-top:2px;">${b.package_name || 'Service in progress'}</div>
      </div>
    </div>`).join('') || '<div style="padding:40px; text-align:center; color:var(--muted); font-style:italic; font-size:20px;">All chairs currently available.</div>';

  document.getElementById('tv-queue-list').innerHTML = queued.map((b, i) => `
    <div class="tv-queue-card">
      <div class="tv-q-num">${i + 1}</div>
      <div class="tv-q-name">${b.customer_name}</div>
      <div class="tv-q-time">${new Date(b.start_time).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>`).join('') || '<div style="padding:40px; text-align:center; color:var(--muted); font-style:italic; font-size:20px;">Queue is empty.</div>';
}

// --- ACTIONS ---
function assignFromMaster(bookingId) {
  const selectEl = document.getElementById('master-chair-select');
  const chairNum = selectEl.value;
  
  if (!chairNum) {
    alert("Please select an open chair from the dropdown menu at the top first.");
    return;
  }
  
  startService(bookingId, parseInt(chairNum));
}

async function startService(bookingId, chairNum) {
  const { error } = await supabaseClient
    .from('bookings')
    .update({ status: 'active', chair_number: chairNum })
    .eq('id', bookingId);
    
  if(error) alert("Error assigning chair: " + error.message);
  else fetchData();
}

async function updateStatus(bookingId, newStatus) {
  if(!confirm(`Mark this booking as ${newStatus.toUpperCase()}?`)) return;
  
  const payload = { status: newStatus };
  if(newStatus === 'completed' || newStatus === 'cancelled') {
    payload.chair_number = null; 
  }

  const { error } = await supabaseClient
    .from('bookings')
    .update(payload)
    .eq('id', bookingId);

  if(error) alert("Error updating status: " + error.message);
  else fetchData();
}
</script>
</body>
</html>
