<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salon Live Queue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f8f6f1;
      --card: #ffffff;
      --line: #e7dfcf;
      --gold: #c8a44d;
      --text: #222;
      --muted: #6e6a61;
      --active: #dff5e8;
      --queue: #fff4db;
      --shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(180deg,#fdfbf7,#f5f0e7);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1f1f1f;
    }

    .hero p {
      color: var(--muted);
      margin-top: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .name {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .active { background: var(--active); }
    .queue { background: var(--queue); }

    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .service {
      font-weight: 500;
      margin-bottom: 10px;
    }

    .chair {
      color: var(--gold);
      font-weight: 600;
    }

    .empty {
      text-align: center;
      padding: 50px;
      color: var(--muted);
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>✨ Live Salon Queue</h1>
      <p>Current active customers and waiting queue</p>
    </div>

    <div id="cards" class="grid"></div>
  </div>

  <script>
    const SUPABASE_URL = prompt('Supabase URL');
    const SUPABASE_KEY = prompt('Supabase Anon Key');

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadQueue() {
      const { data, error } = await supabase
        .from('view_dashboard')
        .select('*')
        .in('status', ['active', 'in_queue'])
        .order('start_time');

      const box = document.getElementById('cards');

      if (error) {
        box.innerHTML = `<div class="empty">${error.message}</div>`;
        return;
      }

      if (!data.length) {
        box.innerHTML = '<div class="empty">No active customers right now</div>';
        return;
      }

      box.innerHTML = data.map(row => `
        <div class="card">
          <div class="row">
            <div class="name">${row.customer_name}</div>
            <div class="badge ${row.status === 'active' ? 'active' : 'queue'}">
              ${row.status === 'active' ? 'Active' : 'In Queue'}
            </div>
          </div>

          <div class="service">${row.services || row.package_name || 'Service'}</div>
          <div class="meta">Start: ${new Date(row.start_time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
          <div class="meta chair">Chair ${row.chair_number || '-'}</div>
        </div>
      `).join('');
    }

    loadQueue();
    setInterval(loadQueue, 15000);
  </script>
</body>
</html>
